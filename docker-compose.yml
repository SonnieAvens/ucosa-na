version: '3.9'

services:
  app:
    build:
      context: .
      target: builder
    command: npm run dev
    ports:
      - '3000:3000'
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - PORT=3000
    env_file:
      - .env
    restart: unless-stopped

networks:
  default:
    name: app-network
