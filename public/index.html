<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ucosa-NA</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f4f6f9;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      text-align: center;
      padding: 60px 40px;
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
      max-width: 500px;
      width: 90%;
    }

    .logo {
      width: 180px;
      height: 180px;
      object-fit: contain;
      margin-bottom: 32px;
      border-radius: 12px;
    }

    h1 {
      font-size: 2rem;
      color: #1a1a2e;
      margin-bottom: 12px;
    }

    p {
      color: #666;
      font-size: 1rem;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="/logo.jpg" alt="Ucosa-NA Logo" class="logo" />
    <h1>Welcome to Ucosa-NA</h1>
    <p>Connecting communities across North America.</p>
  </div>
</body>
</html>
