<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Members Area — UCOSA-NA</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f4f6f9;
      color: #333;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* HEADER */
    header {
      background: #1a1a2e;
      color: white;
      padding: 20px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    header img {
      width: 48px;
      height: 48px;
      object-fit: contain;
      border-radius: 8px;
    }
    header .header-text h1 { font-size: 1.25rem; }
    header .header-text p  { font-size: 0.8rem; color: #aab4c8; }
    header .header-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .btn-logout {
      background: #e63946;
      color: white;
      border: none;
      padding: 8px 18px;
      border-radius: 6px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      text-decoration: none;
    }
    .btn-logout:hover { background: #c1121f; }

    /* TOP NAV */
    .topnav {
      background: #16213e;
      padding: 0 24px;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .topnav a {
      color: #cdd6f4;
      text-decoration: none;
      padding: 10px 14px;
      border-radius: 6px;
      font-size: 0.85rem;
      display: inline-block;
      transition: background 0.2s;
    }
    .topnav a:hover { background: #1a1a2e; color: white; }
    .topnav a.active { background: #1a1a2e; color: white; font-weight: 600; }

    /* LAYOUT */
    .layout {
      display: flex;
      max-width: 1100px;
      margin: 32px auto;
      padding: 0 20px 60px;
      gap: 28px;
      align-items: flex-start;
      flex: 1;
    }

    /* SIDEBAR */
    .sidebar {
      width: 220px;
      flex-shrink: 0;
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      padding: 20px 0;
      position: sticky;
      top: 16px;
    }
    .sidebar h3 {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #999;
      padding: 0 20px 10px;
      border-bottom: 1px solid #f0f0f0;
      margin-bottom: 8px;
    }
    .sidebar a {
      display: block;
      padding: 9px 20px;
      color: #444;
      text-decoration: none;
      font-size: 0.9rem;
      transition: background 0.15s, color 0.15s;
      border-left: 3px solid transparent;
    }
    .sidebar a:hover,
    .sidebar a.active {
      background: #f0f4ff;
      color: #1a1a2e;
      border-left-color: #1a1a2e;
      font-weight: 600;
    }
    .sidebar .sidebar-admin {
      margin: 16px 20px 4px;
      display: block;
      text-align: center;
      background: #e63946;
      color: white;
      padding: 10px;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 600;
      text-decoration: none;
      transition: background 0.2s;
    }
    .sidebar .sidebar-admin:hover { background: #c1121f; border-left-color: transparent; }

    /* CONTENT */
    .content { flex: 1; min-width: 0; }

    section {
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      padding: 32px 36px;
      margin-bottom: 24px;
    }
    section h2 {
      font-size: 1.35rem;
      color: #1a1a2e;
      margin-bottom: 20px;
      padding-bottom: 10px;
      border-bottom: 2px solid #e8ecf4;
    }

    .welcome-banner {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      border-radius: 12px;
      padding: 28px 32px;
      color: white;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .welcome-banner .avatar {
      width: 64px;
      height: 64px;
      background: #e63946;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
      font-weight: 700;
      flex-shrink: 0;
    }
    .welcome-banner h2 {
      font-size: 1.4rem;
      margin-bottom: 4px;
      border: none;
      padding: 0;
      color: white;
    }
    .welcome-banner p { color: #aab4c8; font-size: 0.9rem; margin: 0; }

    .info-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
      margin-top: 8px;
    }
    .info-item {
      background: #f8f9fc;
      border-radius: 10px;
      padding: 16px 18px;
      border: 1px solid #e8ecf4;
    }
    .info-item .label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #999;
      margin-bottom: 6px;
      font-weight: 600;
    }
    .info-item .value {
      font-size: 0.95rem;
      color: #1a1a2e;
      font-weight: 600;
      word-break: break-word;
    }
    .badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 12px;
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
    }
    .badge.admin { background: #fef2f2; color: #e63946; }
    .badge.member { background: #f0f4ff; color: #1a1a2e; }

    .quick-links { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 8px; }
    .quick-link {
      background: #f0f4ff;
      border: 1px solid #dde3f0;
      border-radius: 8px;
      padding: 12px 18px;
      text-decoration: none;
      color: #1a1a2e;
      font-size: 0.9rem;
      font-weight: 600;
      transition: background 0.2s, border-color 0.2s;
    }
    .quick-link:hover { background: #e0e8ff; border-color: #1a1a2e; }
    .quick-link.danger { background: #fff0f0; border-color: #fcc; color: #c1121f; }
    .quick-link.danger:hover { background: #ffe0e0; border-color: #e63946; }

    /* LOADING */
    .loading {
      text-align: center;
      padding: 60px 20px;
      color: #888;
      font-size: 1rem;
    }

    /* FOOTER */
    footer {
      background: #1a1a2e;
      color: #aab4c8;
      text-align: center;
      padding: 18px 20px;
      font-size: 0.8rem;
    }

    @media (max-width: 700px) {
      .layout { flex-direction: column; }
      .sidebar { width: 100%; position: static; }
      section { padding: 22px 18px; }
      .welcome-banner { flex-direction: column; text-align: center; }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header>
    <img src="/logo.jpg" alt="UCOSA-NA Logo" />
    <div class="header-text">
      <h1>UCOSA-North America</h1>
      <p>Members Area</p>
    </div>
    <div class="header-right">
      <span id="headerName" style="color:#cdd6f4;font-size:0.85rem;"></span>
      <button class="btn-logout" onclick="logout()">Logout</button>
    </div>
  </header>

  <!-- TOP NAV -->
  <nav class="topnav">
    <a href="/">Home</a>
    <a href="/members.html" class="active">Members Area</a>
    <a href="/change-password.html">Change Password</a>
  </nav>

  <!-- LAYOUT -->
  <div class="layout" id="mainLayout" style="display:none;">

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <h3>Members Menu</h3>
      <a href="/members.html" class="active">Dashboard</a>
      <a href="/change-password.html">Change Password</a>
      <a href="/">Back to Home</a>
      <a id="adminSidebarLink" href="/admin.html" class="sidebar-admin" style="display:none;">Admin Panel</a>
    </aside>

    <!-- CONTENT -->
    <main class="content" id="mainContent">
      <div class="loading">Loading your profile…</div>
    </main>

  </div>

  <!-- FOOTER -->
  <footer>
    <p>&copy; 2026 UCOSA-North America. All rights reserved.</p>
  </footer>

  <script>
    function logout() {
      localStorage.removeItem('ucosa_token');
      localStorage.removeItem('ucosa_user');
      window.location.href = '/';
    }

    function formatDate(dateStr) {
      if (!dateStr) return 'N/A';
      try {
        return new Date(dateStr).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
      } catch { return dateStr; }
    }

    function getInitials(name) {
      if (!name) return '?';
      return name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
    }

    async function loadProfile() {
      const token = localStorage.getItem('ucosa_token');
      if (!token) {
        window.location.href = '/login.html';
        return;
      }

      try {
        const res = await fetch('/api/auth/me', {
          headers: { 'Authorization': 'Bearer ' + token }
        });

        if (res.status === 401 || res.status === 403) {
          logout();
          return;
        }

        const user = await res.json();

        // If must change password, redirect
        if (user.mustChangePassword) {
          window.location.href = '/change-password.html?required=1';
          return;
        }

        // Update localStorage with fresh data
        localStorage.setItem('ucosa_user', JSON.stringify(user));

        // Show header name
        document.getElementById('headerName').textContent = user.fullName;

        // Show admin link if admin
        if (user.role === 'admin') {
          document.getElementById('adminSidebarLink').style.display = 'block';
        }

        // Build profile content
        const content = document.getElementById('mainContent');
        content.innerHTML = `
          <div class="welcome-banner">
            <div class="avatar">${getInitials(user.fullName)}</div>
            <div>
              <h2>Welcome back, ${user.fullName}!</h2>
              <p>You are signed in as a ${user.role} of UCOSA-North America.</p>
            </div>
          </div>

          <section>
            <h2>Your Profile</h2>
            <div class="info-grid">
              <div class="info-item">
                <div class="label">Full Name</div>
                <div class="value">${user.fullName}</div>
              </div>
              <div class="info-item">
                <div class="label">Email Address</div>
                <div class="value">${user.email}</div>
              </div>
              <div class="info-item">
                <div class="label">Member Role</div>
                <div class="value"><span class="badge ${user.role}">${user.role}</span></div>
              </div>
            </div>
          </section>

          <section>
            <h2>Quick Actions</h2>
            <div class="quick-links">
              <a href="/change-password.html" class="quick-link">&#128274; Change Password</a>
              <a href="/" class="quick-link">&#127968; Back to Home</a>
              ${user.role === 'admin' ? '<a href="/admin.html" class="quick-link" style="background:#fef2f2;border-color:#fcc;color:#c1121f;">&#9881; Admin Panel</a>' : ''}
              <a href="#" class="quick-link danger" onclick="logout(); return false;">&#x2192; Logout</a>
            </div>
          </section>

          <section>
            <h2>About UCOSA-North America</h2>
            <p style="color:#555;line-height:1.8;">
              You are part of the Ugbeka College Old Students' Association — North America Chapter.
              Connect with fellow alumni, stay up to date on events and meetings, and help support our alma mater.
            </p>
            <p style="color:#555;line-height:1.8;margin-top:10px;">
              General Assembly meetings are held <strong>once every two months</strong> on the <strong>last Sunday</strong>
              of the meeting month at <strong>5:00 p.m. Eastern Standard Time</strong> via Zoom.
            </p>
            <p style="color:#555;margin-top:10px;">
              Contact: <a href="mailto:ucosa.northamerica@gmail.com" style="color:#1a1a2e;font-weight:600;">ucosa.northamerica@gmail.com</a>
            </p>
          </section>
        `;

        document.getElementById('mainLayout').style.display = 'flex';

      } catch (err) {
        document.getElementById('mainContent').innerHTML = `
          <section>
            <h2>Error Loading Profile</h2>
            <p style="color:#e63946;">Unable to load your profile. Please <a href="/login.html">log in again</a>.</p>
          </section>
        `;
        document.getElementById('mainLayout').style.display = 'flex';
      }
    }

    loadProfile();
  </script>

</body>
</html>
